<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Been</title>

    <link rel="apple-touch-icon" href="apple-touch-icon.jpg">

    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="apple-mobile-web-app-title" content="Been">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #map {
            height: 100vh;
            width: 100vw;
            background: #aadaff;
            z-index: 1;
        }
        
        .interface-container {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 300px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        h2 { margin: 0 0 10px 0; font-size: 1.4em; color: #333; }
        
        .search-box {
            position: relative;
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-size: 16px;
        }
        
        .suggestions {
            position: absolute;
            top: 45px;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1010;
        }
        .suggestions div {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .suggestions div:hover {
            background-color: #f0f0f0;
        }
        
        .stats {
            margin-top: 5px;
            font-size: 0.9em;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 10px;
            line-height: 1.4;
        }
        .country-list-container {
            margin-top: 10px;
            overflow-y: auto;
            flex-grow: 1;
            max-height: 200px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .country-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px solid #f9f9f9;
            font-size: 0.95em;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2em;
            padding: 0 5px;
        }

        @media (max-width: 600px) {
            .interface-container {
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                max-height: 40vh; 
                border-radius: 20px 20px 0 0;
                box-sizing: border-box;
                padding: 15px 20px;
            }
            
            .country-list-container {
                max-height: 120px; 
            }

            .leaflet-top.leaflet-left {
                top: 10px !important;
                left: auto !important;
                right: 10px !important;
            }
        }
    </style>
</head>
<body>

    <div class="interface-container">
        <h2>Been</h2>
        <div class="search-box">
            <input type="text" id="country-search" placeholder="Rechercher un pays (ex: France)..." autocomplete="on">
            <div id="suggestions" class="suggestions"></div>
        </div>
        <div class="stats" id="stats">
            Pays visités : <b id="visit-count">0</b>
        </div>
        <div class="country-list-container" id="list-container">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const map = L.map('map', {
            minZoom: 2,
            maxZoom: 7,
            worldCopyJump: true
        }).setView([20, 0], 2);

        let geojsonLayer;
        let worldData = null;

        const countryDatabase = {
            "Afghanistan": "AF", "Albania": "AL", "Algeria": "DZ", "Angola": "AO", "Argentina": "AR", 
            "Armenia": "AM", "Australia": "AU", "Austria": "AT", "Azerbaijan": "AZ", "Bahamas": "BS", 
            "Bangladesh": "BD", "Belarus": "BY", "Belgium": "BE", "Belize": "BZ", "Benin": "BJ", 
            "Bhutan": "BT", "Bolivia": "BO", "Bosnia and Herzegovina": "BA", "Botswana": "BW", "Brazil": "BR", 
            "Brunei": "BN", "Bulgaria": "BG", "Burkina Faso": "BF", "Burundi": "BI", "Cambodia": "KH", 
            "Cameroon": "CM", "Canada": "CA", "Central African Republic": "CF", "Chad": "TD", "Chile": "CL", 
            "China": "CN", "Colombia": "CO", "Congo": "CG", "Costa Rica": "CR", "Croatia": "HR", 
            "Cuba": "CU", "Cyprus": "CY", "Czech Republic": "CZ", "Democratic Republic of the Congo": "CD", "Denmark": "DK", 
            "Djibouti": "DJ", "Dominican Republic": "DO", "Ecuador": "EC", "Egypt": "EG", "El Salvador": "SV", 
            "Equatorial Guinea": "GQ", "Eritrea": "ER", "Estonia": "EE", "Ethiopia": "ET", "Falkland Islands": "FK", 
            "Fiji": "FJ", "Finland": "FI", "France": "FR", "Gabon": "GA", "Gambia": "GM", "Georgia": "GE", 
            "Germany": "DE", "Ghana": "GH", "Greece": "GR", "Greenland": "GL", "Guatemala": "GT", 
            "Guinea": "GN", "Guinea-Bissau": "GW", "Guyana": "GY", "Haiti": "HT", "Honduras": "HN", 
            "Hungary": "HU", "Iceland": "IS", "India": "IN", "Indonesia": "ID", "Iran": "IR", 
            "Iraq": "IQ", "Ireland": "IE", "Israel": "IL", "Italy": "IT", "Ivory Coast": "CI", 
            "Jamaica": "JM", "Japan": "JP", "Jordan": "JO", "Kazakhstan": "KZ", "Kenya": "KE", 
            "Kosovo": "XK", "Kuwait": "KW", "Kyrgyzstan": "KG", "Laos": "LA", "Latvia": "LV", 
            "Lebanon": "LB", "Lesotho": "LS", "Liberia": "LR", "Libya": "LY", "Lithuania": "LT", 
            "Luxembourg": "LU", "Macedonia": "MK", "Madagascar": "MG", "Malawi": "MW", "Malaysia": "MY", 
            "Mali": "ML", "Martinique": "MQ", "Mauritania": "MR", "Mexico": "MX", "Moldova": "MD", 
            "Mongolia": "MN", "Montenegro": "ME", "Morocco": "MA", "Mozambique": "MZ", "Myanmar": "MM", 
            "Namibia": "NA", "Nepal": "NP", "Netherlands": "NL", "New Caledonia": "NC", "New Zealand": "NZ", 
            "Nicaragua": "NI", "Niger": "NE", "Nigeria": "NG", "North Korea": "KP", "Norway": "NO", 
            "Oman": "OM", "Pakistan": "PK", "Palestine": "PS", "Panama": "PA", "Papua New Guinea": "PG", 
            "Paraguay": "PY", "Peru": "PE", "Philippines": "PH", "Poland": "PL", "Portugal": "PT", 
            "Puerto Rico": "PR", "Qatar": "QA", "Romania": "RO", "Russia": "RU", "Rwanda": "RW", 
            "Saudi Arabia": "SA", "Senegal": "SN", "Serbia": "RS", "Sierra Leone": "SL", "Singapore": "SG", 
            "Slovakia": "SK", "Slovenia": "SI", "Solomon Islands": "SB", "Somalia": "SO", "South Africa": "ZA", 
            "South Korea": "KR", "South Sudan": "SS", "Spain": "ES", "Sri Lanka": "LK", "Sudan": "SD", 
            "Suriname": "SR", "Swaziland": "SZ", "Sweden": "SE", "Switzerland": "CH", "Syria": "SY", 
            "Taiwan": "TW", "Tajikistan": "TJ", "Tanzania": "TZ", "Thailand": "TH", "East Timor": "TL", 
            "Togo": "TG", "Trinidad and Tobago": "TT", "Tunisia": "TN", "Turkey": "TR", "Turkmenistan": "TM", 
            "Uganda": "UG", "Ukraine": "UA", "United Arab Emirates": "AE", "United Kingdom": "GB", 
            "United States of America": "US", "Uruguay": "UY", "Uzbekistan": "UZ", "Vanuatu": "VU", 
            "Venezuela": "VE", "Vietnam": "VN", "Western Sahara": "EH", "Yemen": "YE", "Zambia": "ZM", "Zimbabwe": "ZW"
        };

        const totalCountriesCount = Object.keys(countryDatabase).length;
        
        let visitedCountries = JSON.parse(localStorage.getItem('visitedCountries')) || [];

        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(response => response.json())
            .then(data => {
                worldData = data;
                renderMap();
                setupSearch();
                updateUI();
            });

        function getCountryName(feature) {
            if (!feature || !feature.properties) return null;
            let name = feature.properties.ADMIN || feature.properties.name || feature.properties.NAME;
            if (!name) return null;
            name = name.trim();
            if (name === "United States") return "United States of America";
            return name;
        }

        function renderMap() {
            if (geojsonLayer) {
                map.removeLayer(geojsonLayer);
            }

            geojsonLayer = L.geoJSON(worldData, {
                style: function(feature) {
                    const countryName = getCountryName(feature);
                    const isVisited = visitedCountries.includes(countryName);
                    return {
                        fillColor: isVisited ? '#FFEB3B' : '#E0E0E0',
                        weight: 1,
                        opacity: 1,
                        color: '#FFFFFF',
                        fillOpacity: 0.8
                    };
                },
                onEachFeature: function(feature, layer) {
                    const countryName = getCountryName(feature);
                    if (!countryName) return;
                    
                    layer.on('click', function(e) {
                        L.DomEvent.stopPropagation(e);
                        toggleCountry(countryName);
                    });

                    layer.bindTooltip(countryName, { sticky: true });
                }
            }).addTo(map);
        }

        function toggleCountry(countryName) {
            if (!countryName) return;
            
            const index = visitedCountries.indexOf(countryName);
            if (index === -1) {
                visitedCountries.push(countryName);
            } else {
                visitedCountries.splice(index, 1);
            }
            
            localStorage.setItem('visitedCountries', JSON.stringify(visitedCountries));
            
            renderMap();
            updateUI();
        }

        function setupSearch() {
            const searchInput = document.getElementById('country-search');
            const suggestionsContainer = document.getElementById('suggestions');
            const uniqueCountries = Object.keys(countryDatabase).sort();

            searchInput.addEventListener('input', function() {
                const value = this.value.toLowerCase().trim();
                suggestionsContainer.innerHTML = '';
                
                if (!value) {
                    suggestionsContainer.style.display = 'none';
                    return;
                }

                const matches = uniqueCountries.filter(country => 
                    country.toLowerCase().includes(value)
                );

                if (matches.length > 0) {
                    matches.slice(0, 5).forEach(match => {
                        const div = document.createElement('div');
                        div.textContent = match;
                        
                        div.addEventListener('click', function() {
                            if (!visitedCountries.includes(match)) {
                                toggleCountry(match);
                            }
                            searchInput.value = '';
                            suggestionsContainer.style.display = 'none';
                            
                            if (geojsonLayer) {
                                geojsonLayer.eachLayer(function(layer) {
                                    if (layer.feature && getCountryName(layer.feature) === match) {
                                        map.fitBounds(layer.getBounds());
                                    }
                                });
                            }
                        });
                        suggestionsContainer.appendChild(div);
                    });
                    suggestionsContainer.style.display = 'block';
                } else {
                    suggestionsContainer.style.display = 'none';
                }
            });

            document.addEventListener('click', function(e) {
                if (e.target !== searchInput) {
                    suggestionsContainer.style.display = 'none';
                }
            });
        }

        function getFlagEmoji(countryName) {
            const code = countryDatabase[countryName];
            if (!code) return "📍"; 
            return code
                .toUpperCase()
                .replace(/./g, char => String.fromCodePoint(char.charCodeAt(0) + 127397));
        }

        function updateUI() {
            visitedCountries.sort();
            
            const percentage = totalCountriesCount > 0 
                ? ((visitedCountries.length / totalCountriesCount) * 100).toFixed(1) 
                : 0;

            document.getElementById('stats').innerHTML = `
                Pays visités : <b id="visit-count">${visitedCountries.length}</b> / ${totalCountriesCount}<br>
                Progression mondiale : <b>${percentage}%</b>
            `;
            
            const listContainer = document.getElementById('list-container');
            listContainer.innerHTML = '';
            
            if (visitedCountries.length === 0) {
                listContainer.innerHTML = '<span style="color:#aaa; font-style:italic;">Aucun pays enregistré</span>';
                return;
            }

            visitedCountries.forEach(country => {
                const icon = getFlagEmoji(country);
                const item = document.createElement('div');
                item.className = 'country-item';
                item.innerHTML = `
                    <span>${icon} ${country}</span>
                    <button class="delete-btn" title="Supprimer">&times;</button>
                `;
                
                item.querySelector('.delete-btn').addEventListener('click', function() {
                    toggleCountry(country);
                });
                
                listContainer.appendChild(item);
            });
        }
    </script>
</body>
</html>
